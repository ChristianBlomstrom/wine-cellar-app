<script>
function renderTimeline(){
  const minYear = 2005;
  const maxYear = 2040;
  const range = maxYear - minYear;
  const axis = document.getElementById("yearAxis");
  const rows = document.getElementById("timelineRows");
  const year = new Date().getFullYear();

  let ticks = "";
  for(let y = minYear; y <= maxYear; y += 5){
    const left = ((y - minYear) / range) * 100;
    ticks += `
      <div class="tick" style="left:${left}%">
        <span>${y.toString().slice(2)}</span>
      </div>
    `;
  }

  const todayLeft = ((year - minYear) / range) * 100;
  axis.innerHTML = ticks + `<div class="today-line" style="left:${todayLeft}%"></div>`;

  rows.innerHTML = bottles
    .slice()
    .sort((a,b) => {
      const pa = a.producer || "";
      const pb = b.producer || "";
      return pa.localeCompare(pb);
    })
    .map(b => {
      const status = getStatus(b);
      const left = ((Number(b.drinkFrom) - minYear) / range) * 100;
      const width = ((Number(b.drinkTo) - Number(b.drinkFrom)) / range) * 100;
      const cls =
        status === "Ready" ? "ready" :
        status === "Aging" ? "aging" : "past";

      return `
        <div class="timeline-row">
          <div class="timeline-name">${escapeHtml(b.producer || b.name)}</div>
          <div class="timeline-track">
            <div class="timeline-bar ${cls}" style="left:${left}%; width:${Math.max(width, 1.5)}%"></div>
          </div>
          <div class="timeline-end">${escapeHtml(`${b.drinkFrom}–${b.drinkTo}`)}</div>
        </div>
      `;
    }).join("");
}
</script>
