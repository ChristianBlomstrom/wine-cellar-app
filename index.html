<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Cellar</title>
  <style>
    :root{
      --bg:#1f120d;
      --bg2:#2a1710;
      --panel:#3a281f;
      --panel2:#473126;
      --line:#6b4a33;
      --text:#f4e6c7;
      --muted:#c7ab7a;
      --gold:#d8b46a;
      --green:#78c67a;
      --yellow:#d9b557;
      --red:#d86a6a;
      --blue:#8bc1d9;
      --shadow:0 10px 24px rgba(0,0,0,.25);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#2a140d 0%, #1a100d 100%);color:var(--text);font-family:Georgia, "Times New Roman", serif}
    body{min-height:100vh}
    .app{max-width:1600px;margin:0 auto;padding:18px 20px 40px}

    .hero{
      background:
        radial-gradient(circle at top left, rgba(184,84,26,.25), transparent 35%),
        radial-gradient(circle at top right, rgba(255,160,80,.10), transparent 30%),
        linear-gradient(180deg,#3a1d12 0%, #25140e 100%);
      border:1px solid rgba(216,180,106,.18);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      padding:22px 24px 10px;
    }

    .brand{
      display:flex;
      gap:14px;
      align-items:flex-start;
    }

    .brand .icon{
      font-size:34px;
      line-height:1;
      margin-top:2px;
    }

    .title-wrap h1{
      margin:0;
      font-size:42px;
      letter-spacing:1.6px;
      color:var(--gold);
    }
    .subtitle{
      margin-top:4px;
      color:var(--muted);
      font-size:14px;
      letter-spacing:1.8px;
      text-transform:uppercase;
    }

    .summary-pills{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding:0 24px 18px;
    }

    .pill{
      border:1px solid rgba(216,180,106,.28);
      color:var(--muted);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      padding:10px 16px;
      min-width:120px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:15px;
    }
    .pill strong{color:var(--text)}
    .pill.ready strong{color:var(--green)}
    .pill.aging strong{color:var(--yellow)}
    .pill.past strong{color:var(--red)}

    .tabs{
      display:flex;
      gap:8px;
      border-top:1px solid rgba(216,180,106,.18);
      padding:0 18px;
      background:rgba(0,0,0,.08);
    }

    .tab-btn{
      appearance:none;
      border:none;
      background:none;
      color:var(--muted);
      padding:18px 16px 16px;
      font-size:15px;
      letter-spacing:1.8px;
      text-transform:uppercase;
      cursor:pointer;
      border-bottom:2px solid transparent;
    }
    .tab-btn.active{
      color:var(--gold);
      border-bottom-color:var(--gold);
    }

    .tab-panel{display:none;padding:20px}
    .tab-panel.active{display:block}

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .grid-4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.07));
      border:1px solid rgba(216,180,106,.14);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }

    .panel h3{
      margin:0 0 14px;
      color:var(--muted);
      font-size:13px;
      letter-spacing:2.3px;
      text-transform:uppercase;
    }

    .bar-row{
      display:grid;
      grid-template-columns:78px 1fr 28px;
      gap:10px;
      align-items:center;
      margin:10px 0;
      font-size:15px;
    }
    .bar-row .label{color:var(--text)}
    .bar-row .value{color:var(--gold);text-align:right}
    .bar{
      height:10px;
      border-radius:999px;
      background:#241811;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.03);
    }
    .fill{height:100%;border-radius:999px}
    .fill.red{background:#c94f68}
    .fill.gold{background:#d7b14d}
    .fill.blue{background:#76bad7}
    .fill.green{background:#7fcb81}
    .fill.yellow{background:#d6b55f}
    .fill.pink{background:#dd728a}

    .cards{
      display:grid;
      grid-template-columns:repeat(9,1fr);
      gap:12px;
      margin-top:18px;
    }

    .mini-card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(216,180,106,.14);
      border-radius:14px;
      padding:14px;
      min-height:122px;
    }
    .mini-card .code{
      font-size:13px;
      color:var(--gold);
      letter-spacing:1.5px;
      text-transform:uppercase;
      margin-bottom:10px;
    }
    .mini-card .country{
      font-size:22px;
      color:var(--text);
      margin-bottom:4px;
      font-weight:bold;
    }
    .mini-card .regions{
      color:var(--muted);
      font-size:15px;
      min-height:42px;
    }
    .mini-card .count{
      color:var(--gold);
      font-size:28px;
      margin-top:12px;
      font-weight:bold;
    }

    .timeline-wrap{
      overflow:auto;
      padding:16px;
      background:rgba(255,255,255,.02);
      border-radius:16px;
      border:1px solid rgba(216,180,106,.12);
    }
    .timeline-scale{
      position:relative;
      min-width:1200px;
      margin-top:10px;
    }
    .timeline-header{
      display:grid;
      grid-template-columns:180px 1fr 80px;
      gap:14px;
      margin-bottom:10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1.6px;
      text-transform:uppercase;
    }
    .year-axis{
      position:relative;
      height:32px;
      margin-bottom:10px;
      border-bottom:1px solid rgba(216,180,106,.12);
    }
    .year-axis .tick{
      position:absolute;
      top:0;
      bottom:0;
      width:1px;
      background:rgba(216,180,106,.18);
    }
    .year-axis .tick span{
      position:absolute;
      top:0;
      transform:translateX(-50%);
      color:var(--muted);
      font-size:12px;
    }
    .today-line{
      position:absolute;
      top:0;
      bottom:0;
      width:2px;
      background:var(--gold);
      box-shadow:0 0 0 2px rgba(216,180,106,.12);
    }

    .timeline-row{
      display:grid;
      grid-template-columns:180px 1fr 80px;
      gap:14px;
      align-items:center;
      margin:9px 0;
      min-width:1200px;
    }
    .timeline-name{
      color:var(--text);
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .timeline-end{
      color:var(--muted);
      font-size:13px;
      text-align:right;
    }
    .timeline-track{
      position:relative;
      height:16px;
      border-radius:999px;
      background:#20150f;
      border:1px solid rgba(216,180,106,.08);
      overflow:hidden;
    }
    .timeline-bar{
      position:absolute;
      top:0;
      height:100%;
      border-radius:999px;
      opacity:.96;
    }
    .timeline-bar.ready{background:linear-gradient(90deg,#59b76e,#7ddf83)}
    .timeline-bar.aging{background:linear-gradient(90deg,#c9ad4a,#e4c965)}
    .timeline-bar.past{background:linear-gradient(90deg,#a63c3c,#d25454)}

    .collection-tools{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:end;
      margin-bottom:18px;
    }

    .tool-group{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .tool-group label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:1.5px;
      text-transform:uppercase;
    }
    input, select, textarea{
      background:#241611;
      color:var(--text);
      border:1px solid rgba(216,180,106,.18);
      border-radius:12px;
      padding:11px 12px;
      font-family:inherit;
      font-size:15px;
      min-height:44px;
      outline:none;
    }
    textarea{min-height:86px;resize:vertical}

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      cursor:pointer;
      font-family:inherit;
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:linear-gradient(180deg,#e0bf78,#c89f52);
      color:#24160e;
      font-weight:bold;
    }
    .btn-secondary{
      background:#35241b;
      color:var(--text);
      border:1px solid rgba(216,180,106,.18);
    }
    .btn-danger{
      background:#6b2d2d;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .collection-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .wine-card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.09));
      border:1px solid rgba(216,180,106,.14);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .wine-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .wine-top h4{
      margin:0;
      font-size:22px;
      color:var(--text);
      line-height:1.2;
    }
    .producer{
      color:var(--muted);
      font-size:15px;
      margin-top:3px;
    }
    .badge{
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      letter-spacing:1.2px;
      text-transform:uppercase;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.08);
    }
    .badge.ready{background:rgba(120,198,122,.15); color:#9be09f}
    .badge.aging{background:rgba(217,181,87,.14); color:#f0d27d}
    .badge.past{background:rgba(216,106,106,.14); color:#ff9f9f}

    .wine-meta{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px 14px;
      font-size:15px;
    }
    .meta-item span{
      display:block;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1.3px;
      text-transform:uppercase;
      margin-bottom:4px;
    }

    .notes{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(216,180,106,.1);
    }
    .notes strong{
      display:block;
      color:var(--gold);
      font-size:12px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .notes div{
      color:var(--text);
      font-size:15px;
      line-height:1.45;
    }

    .wine-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:auto;
      padding-top:4px;
    }
    .price{
      color:var(--gold);
      font-size:18px;
      font-weight:bold;
    }

    .add-form{
      margin-top:18px;
      display:none;
    }
    .add-form.open{display:block}
    .form-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }
    .form-grid .full{grid-column:1 / -1}
    .form-actions{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .empty{
      padding:30px;
      text-align:center;
      color:var(--muted);
      border:1px dashed rgba(216,180,106,.2);
      border-radius:16px;
      background:rgba(255,255,255,.02);
    }

    .small{
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width: 1200px){
      .grid-3,.grid-4,.collection-grid,.form-grid{grid-template-columns:repeat(2,1fr)}
      .cards{grid-template-columns:repeat(4,1fr)}
    }
    @media (max-width: 760px){
      .hero-top{flex-direction:column}
      .title-wrap h1{font-size:32px}
      .grid-3,.grid-4,.collection-grid,.form-grid{grid-template-columns:1fr}
      .cards{grid-template-columns:repeat(2,1fr)}
      .wine-meta{grid-template-columns:1fr}
      .tab-btn{padding-inline:10px;font-size:13px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="icon">🍷</div>
          <div class="title-wrap">
            <h1>WINE CELLAR</h1>
            <div class="subtitle" id="heroSubtitle">0 bottles · 0 countries</div>
          </div>
        </div>
      </div>

      <div class="summary-pills">
        <div class="pill ready"><span>Ready</span><strong id="pillReady">0</strong></div>
        <div class="pill aging"><span>Aging</span><strong id="pillAging">0</strong></div>
        <div class="pill past"><span>Past Peak</span><strong id="pillPast">0</strong></div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="timeline">Timeline</button>
        <button class="tab-btn" data-tab="collection">Collection</button>
      </div>

      <div class="tab-panel active" id="tab-overview">
        <div class="grid-3">
          <div class="panel">
            <h3>By Country</h3>
            <div id="countryBars"></div>
          </div>

          <div class="panel">
            <h3>By Type</h3>
            <div id="typeBars"></div>
          </div>

          <div class="panel">
            <h3>Drink Window Status</h3>
            <div id="statusBars"></div>
            <div class="panel" style="margin-top:16px;padding:24px;text-align:center;background:rgba(216,180,106,.06);border-color:rgba(216,180,106,.18)">
              <div style="font-size:42px;color:var(--gold);font-weight:bold" id="readyNowBig">0</div>
              <div class="subtitle" style="margin-top:6px">Bottles ready now</div>
            </div>
          </div>
        </div>

        <div class="panel" style="margin-top:18px">
          <h3>Regions at a glance</h3>
          <div class="cards" id="regionCards"></div>
        </div>
      </div>

      <div class="tab-panel" id="tab-timeline">
        <div class="panel">
          <h3>Drink Window Timeline (2005–2040)</h3>
          <div class="timeline-wrap">
            <div class="timeline-header">
              <div>Wine</div>
              <div>Drink Window Timeline</div>
              <div>Window</div>
            </div>
            <div class="timeline-scale">
              <div class="year-axis" id="yearAxis"></div>
              <div id="timelineRows"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="tab-collection">
        <div class="panel">
          <h3>Collection</h3>

          <div class="collection-tools">
            <div class="tool-group">
              <label>Search</label>
              <input id="searchInput" type="text" placeholder="Search wine, producer, region..." />
            </div>

            <div class="tool-group">
              <label>Wine type</label>
              <select id="typeFilter">
                <option value="all">All types</option>
                <option value="Red">Red</option>
                <option value="White">White</option>
                <option value="Sparkling">Sparkling</option>
                <option value="Rosé">Rosé</option>
                <option value="Aromatized">Aromatized</option>
              </select>
            </div>

            <div class="tool-group">
              <label>Status</label>
              <select id="statusFilter">
                <option value="all">All statuses</option>
                <option value="Ready">Ready</option>
                <option value="Aging">Aging</option>
                <option value="Past Peak">Past Peak</option>
              </select>
            </div>

            <div class="tool-group">
              <label>Country</label>
              <select id="countryFilter">
                <option value="all">All countries</option>
              </select>
            </div>

            <div class="tool-group">
              <label>Price</label>
              <select id="priceFilter">
                <option value="all">All prices</option>
                <option value="lt100">&lt; 100 SEK</option>
                <option value="100-199">100–199 SEK</option>
                <option value="200-299">200–299 SEK</option>
                <option value="300-399">300–399 SEK</option>
                <option value="gte400">&gt;= 400 SEK</option>
              </select>
            </div>

            <button class="btn btn-primary" id="toggleAddBtn">Add new bottle</button>
            <button class="btn btn-secondary" id="resetStarterBtn">Reset to starter collection</button>
          </div>

          <div class="add-form panel" id="addFormWrap" style="background:rgba(0,0,0,.08)">
            <h3>Add Bottle Manually</h3>
            <div class="form-grid">
              <div class="tool-group">
                <label>Wine name</label>
                <input id="fName" type="text" placeholder="e.g. Taittinger Brut Réserve" />
              </div>
              <div class="tool-group">
                <label>Producer</label>
                <input id="fProducer" type="text" placeholder="e.g. Taittinger" />
              </div>
              <div class="tool-group">
                <label>Vintage</label>
                <input id="fVintage" type="text" placeholder="e.g. NV or 2019" />
              </div>
              <div class="tool-group">
                <label>Type</label>
                <select id="fType">
                  <option>Red</option>
                  <option>White</option>
                  <option>Sparkling</option>
                  <option>Rosé</option>
                  <option>Aromatized</option>
                </select>
              </div>

              <div class="tool-group">
                <label>Country</label>
                <input id="fCountry" type="text" placeholder="e.g. France" />
              </div>
              <div class="tool-group">
                <label>Region</label>
                <input id="fRegion" type="text" placeholder="e.g. Champagne" />
              </div>
              <div class="tool-group">
                <label>Grapes</label>
                <input id="fGrapes" type="text" placeholder="e.g. Pinot Noir, Chardonnay" />
              </div>
              <div class="tool-group">
                <label>Price SEK</label>
                <input id="fPrice" type="number" placeholder="e.g. 299" />
              </div>

              <div class="tool-group">
                <label>Drink from</label>
                <input id="fDrinkFrom" type="number" placeholder="e.g. 2025" />
              </div>
              <div class="tool-group">
                <label>Drink to</label>
                <input id="fDrinkTo" type="number" placeholder="e.g. 2029" />
              </div>
              <div class="tool-group full">
                <label>Food pairing</label>
                <textarea id="fFood" placeholder="e.g. Lamb, grilled beef, hard cheeses"></textarea>
              </div>
              <div class="tool-group full">
                <label>Style notes</label>
                <textarea id="fStyle" placeholder="e.g. Dry, medium-full, dark fruit, spice, oak"></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn btn-primary" id="saveBottleBtn">Save bottle</button>
              <button class="btn btn-secondary" id="cancelAddBtn">Cancel</button>
            </div>
          </div>

          <div id="collectionGrid" class="collection-grid" style="margin-top:18px"></div>
          <div id="emptyState" class="empty" style="display:none;margin-top:18px">No bottles match your filters.</div>
        </div>
      </div>
    </section>
  </div>

  <script>

    const STORAGE_KEY = "wine-cellar-manual-v4";

    function loadBottles(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STARTER_BOTTLES));
        return structuredClone(STARTER_BOTTLES);
      }
      try{
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : structuredClone(STARTER_BOTTLES);
      }catch{
        return structuredClone(STARTER_BOTTLES);
      }
    }

    let bottles = loadBottles();

    function saveBottles(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bottles));
    }

    function currentYear(){
      return new Date().getFullYear();
    }

    function getStatus(bottle){
      const year = currentYear();
      if(year < Number(bottle.drinkFrom)) return "Aging";
      if(year > Number(bottle.drinkTo)) return "Past Peak";
      return "Ready";
    }

    function getPriceBand(price){
      const p = Number(price || 0);
      if(p < 100) return "lt100";
      if(p <= 199) return "100-199";
      if(p <= 299) return "200-299";
      if(p <= 399) return "300-399";
      return "gte400";
    }

    function groupCount(arr, field){
      const out = {};
      arr.forEach(item => {
        const key = item[field] || "Unknown";
        out[key] = (out[key] || 0) + 1;
      });
      return out;
    }

    function countriesMap(arr){
      const map = {};
      arr.forEach(b => {
        const key = b.country || "Unknown";
        if(!map[key]) map[key] = { count:0, regions:new Set() };
        map[key].count += 1;
        if(b.region) map[key].regions.add(b.region);
      });
      return map;
    }

    function sortEntriesDesc(obj){
      return Object.entries(obj).sort((a,b) => b[1] - a[1]);
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderOverview(){
      const ready = bottles.filter(b => getStatus(b) === "Ready").length;
      const aging = bottles.filter(b => getStatus(b) === "Aging").length;
      const past = bottles.filter(b => getStatus(b) === "Past Peak").length;
      const countryCount = new Set(bottles.map(b => b.country)).size;

      document.getElementById("heroSubtitle").textContent = `${bottles.length} bottles · ${countryCount} countries`;
      document.getElementById("pillReady").textContent = ready;
      document.getElementById("pillAging").textContent = aging;
      document.getElementById("pillPast").textContent = past;
      document.getElementById("readyNowBig").textContent = ready;

      const countryBars = document.getElementById("countryBars");
      const countries = countriesMap(bottles);
      const maxCountry = Math.max(...Object.values(countries).map(v => v.count), 1);
      countryBars.innerHTML = Object.entries(countries)
        .sort((a,b)=>b[1].count-a[1].count)
        .map(([name,data]) => `
          <div class="bar-row">
            <div class="label">${escapeHtml(name)}</div>
            <div class="bar"><div class="fill red" style="width:${(data.count/maxCountry)*100}%"></div></div>
            <div class="value">${data.count}</div>
          </div>
        `).join("");

      const typeBars = document.getElementById("typeBars");
      const types = groupCount(bottles, "type");
      const typeColors = {Red:"red", White:"gold", Sparkling:"blue", Rosé:"pink", Aromatized:"yellow"};
      const maxType = Math.max(...Object.values(types), 1);
      typeBars.innerHTML = sortEntriesDesc(types)
        .map(([name,count]) => `
          <div class="bar-row">
            <div class="label">${escapeHtml(name)}</div>
            <div class="bar"><div class="fill ${typeColors[name] || "green"}" style="width:${(count/maxType)*100}%"></div></div>
            <div class="value">${count}</div>
          </div>
        `).join("");

      const statusBars = document.getElementById("statusBars");
      const statusData = {Ready:ready, Aging:aging, "Past Peak":past};
      const statusColors = {Ready:"green", Aging:"yellow", "Past Peak":"red"};
      const maxStatus = Math.max(ready, aging, past, 1);
      statusBars.innerHTML = Object.entries(statusData)
        .map(([name,count]) => `
          <div class="bar-row">
            <div class="label">${escapeHtml(name)}</div>
            <div class="bar"><div class="fill ${statusColors[name]}" style="width:${(count/maxStatus)*100}%"></div></div>
            <div class="value">${count}</div>
          </div>
        `).join("");

      const regionCards = document.getElementById("regionCards");
      const codeMap = {
        Italy:"IT", France:"FR", Spain:"ES", Germany:"DE", Australia:"AU",
        Sweden:"SE", USA:"US"
      };
      regionCards.innerHTML = Object.entries(countries)
        .sort((a,b)=>b[1].count-a[1].count)
        .map(([country,data]) => `
          <div class="mini-card">
            <div class="code">${codeMap[country] || country.slice(0,2).toUpperCase()}</div>
            <div class="country">${escapeHtml(country)}</div>
            <div class="regions">${escapeHtml(Array.from(data.regions).slice(0,3).join(" · "))}</div>
            <div class="count">${data.count}</div>
          </div>
        `).join("");
    }

    function renderTimeline(){
      const minYear = 2005;
      const maxYear = 2040;
      const range = maxYear - minYear;
      const axis = document.getElementById("yearAxis");
      const rows = document.getElementById("timelineRows");
      const year = currentYear();

      let ticks = "";
      for(let y=minYear; y<=maxYear; y+=5){
        const left = ((y-minYear)/range) * 100;
        ticks += `<div class="tick" style="left:${left}%"><span>${y}</span></div>`;
      }
      const todayLeft = ((year-minYear)/range) * 100;
      axis.innerHTML = ticks + `<div class="today-line" style="left:${todayLeft}%"></div>`;

      rows.innerHTML = bottles
        .slice()
        .sort((a,b)=>Number(a.drinkFrom)-Number(b.drinkFrom))
        .map(b => {
          const status = getStatus(b);
          const left = ((Number(b.drinkFrom)-minYear)/range)*100;
          const width = ((Number(b.drinkTo)-Number(b.drinkFrom))/range)*100;
          const cls = status === "Ready" ? "ready" : status === "Aging" ? "aging" : "past";
          return `
            <div class="timeline-row">
              <div class="timeline-name">${escapeHtml(b.producer)}</div>
              <div class="timeline-track">
                <div class="timeline-bar ${cls}" style="left:${left}%; width:${Math.max(width,1.2)}%"></div>
              </div>
              <div class="timeline-end">${escapeHtml(`${b.drinkFrom}–${b.drinkTo}`)}</div>
            </div>
          `;
        }).join("");
    }

    function populateCountryFilter(){
      const select = document.getElementById("countryFilter");
      const countries = [...new Set(bottles.map(b => b.country).filter(Boolean))].sort();
      const current = select.value || "all";
      select.innerHTML = `<option value="all">All countries</option>` +
        countries.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
      if(countries.includes(current)) select.value = current;
    }

    function renderCollection(){
      populateCountryFilter();

      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const typeFilter = document.getElementById("typeFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;
      const countryFilter = document.getElementById("countryFilter").value;
      const priceFilter = document.getElementById("priceFilter").value;

      let filtered = bottles.filter(b => {
        const status = getStatus(b);
        const haystack = [
          b.name,b.producer,b.vintage,b.country,b.region,b.type,b.grapes,b.foodPairing,b.styleNotes
        ].join(" ").toLowerCase();

        const matchSearch = !search || haystack.includes(search);
        const matchType = typeFilter === "all" || b.type === typeFilter;
        const matchStatus = statusFilter === "all" || status === statusFilter;
        const matchCountry = countryFilter === "all" || b.country === countryFilter;
        const matchPrice = priceFilter === "all" || getPriceBand(b.priceSEK) === priceFilter;

        return matchSearch && matchType && matchStatus && matchCountry && matchPrice;
      });

      const grid = document.getElementById("collectionGrid");
      const empty = document.getElementById("emptyState");

      if(!filtered.length){
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      filtered = filtered.sort((a,b) => {
        const sa = getStatus(a), sb = getStatus(b);
        const order = {"Ready":0,"Aging":1,"Past Peak":2};
        return order[sa]-order[sb] || a.country.localeCompare(b.country) || a.name.localeCompare(b.name);
      });

      grid.innerHTML = filtered.map(b => {
        const status = getStatus(b);
        const statusClass = status === "Ready" ? "ready" : status === "Aging" ? "aging" : "past";
        return `
          <article class="wine-card">
            <div class="wine-top">
              <div>
                <h4>${escapeHtml(b.name)}</h4>
                <div class="producer">${escapeHtml(b.producer)}${b.vintage ? " · " + escapeHtml(b.vintage) : ""}</div>
              </div>
              <div class="badge ${statusClass}">${escapeHtml(status)}</div>
            </div>

            <div class="wine-meta">
              <div class="meta-item">
                <span>Type</span>
                ${escapeHtml(b.type)}
              </div>
              <div class="meta-item">
                <span>Country / Region</span>
                ${escapeHtml(b.country)}${b.region ? " · " + escapeHtml(b.region) : ""}
              </div>
              <div class="meta-item">
                <span>Grapes</span>
                ${escapeHtml(b.grapes || "-")}
              </div>
              <div class="meta-item">
                <span>Drink window</span>
                ${escapeHtml(`${b.drinkFrom}–${b.drinkTo}`)}
              </div>
            </div>

            <div class="notes">
              <strong>Food pairing</strong>
              <div>${escapeHtml(b.foodPairing || "-")}</div>
            </div>

            <div class="notes">
              <strong>Wine info / style</strong>
              <div>${escapeHtml(b.styleNotes || "-")}</div>
            </div>

            <div class="wine-actions">
              <div class="price">${Number(b.priceSEK || 0)} SEK</div>
              <button class="btn btn-danger" onclick="deleteBottle('${b.id}')">Delete</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderAll(){
      renderOverview();
      renderTimeline();
      renderCollection();
    }

    function deleteBottle(id){
      if(!confirm("Delete this bottle?")) return;
      bottles = bottles.filter(b => b.id !== id);
      saveBottles();
      renderAll();
    }

    window.deleteBottle = deleteBottle;

      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

      });
    });

        alert("Please fill in at least wine name, producer, country and type.");

      bottles.unshift(data);
      saveBottles();

      [
        "fName","fProducer","fVintage","fCountry","fRegion","fGrapes",
        "fPrice","fDrinkFrom","fDrinkTo","fFood","fStyle"
      ].forEach(id => document.getElementById(id).value = "");
      document.getElementById("fType").value = "Red";
      document.getElementById("addFormWrap").classList.remove("open");

      renderAll();
      document.querySelector('[data-tab="collection"]').click();
    });

    document.getElementById("resetStarterBtn").addEventListener("click", () => {
      if(!confirm("Reset app to the starter collection from this chat?")) return;
      bottles = structuredClone(STARTER_BOTTLES);
      saveBottles();
      renderAll();
    });

    ["searchInput","typeFilter","statusFilter","countryFilter","priceFilter"].forEach(id => {
      document.getElementById(id).addEventListener("input", renderCollection);
      document.getElementById(id).addEventListener("change", renderCollection);
    });

    renderAll();
  </script>
</body>
</html>
